apiVersion: apps/v1
kind: Deployment
metadata:
  name: parallax-app
  labels:
    app: parallax-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parallax-app
  template:
    metadata:
      labels:
        app: parallax-app
    spec:
      containers:
        - name: parallax-app
          image: parallax-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: parallax-app-service
  labels:
    app: parallax-app
spec:
  type: NodePort
  selector:
    app: parallax-app
  ports:
    - protocol: TCP
      port: 80     
      targetPort: 80    
      nodePort: 30080